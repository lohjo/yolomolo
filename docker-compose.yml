services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "3000:3000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - model-cache:/home/mathocr/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8001"
    environment:
      - CUDA_VISIBLE_DEVICES=1
    command: >
      --model allenai/olmOCR-2-7B-1025
      --port 8001
      --max-model-len 4096
      --gpu-memory-utilization 0.9
    volumes:
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - vlm

volumes:
  model-cache:
