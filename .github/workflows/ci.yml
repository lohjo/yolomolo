name: MathScribe CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --coverage --reporter=json > test-results.json

  claude-review:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Get diff
        run: git diff origin/${{ github.base_ref }}..HEAD -- '*.ts' '*.tsx' '*.py' > pr.diff
      - name: Claude Code review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat .claude/review-system-prompt.md)" \
            --file pr.diff \
            --max-tokens 4000 \
            --output-format json > review.json
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const r = require('./review.json')
            const body = require('./scripts/format-review.js')(r)
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body })
      - name: Fail on critical findings
        run: |
          node -e "
            const r = require('./review.json')
            const critical = r.findings.filter(f => f.severity === 'critical')
            if (critical.length) { console.error(JSON.stringify(critical,null,2)); process.exit(1) }
          "

  vercel-preview:
    runs-on: ubuntu-latest
    needs: [lint-test, claude-review]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  vercel-prod:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
